<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>INFINITAS Chart Search</title>
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</head>
<body>
  <h1>INFINITAS Chart Search</h1>

  <div>
    <span>データ更新</span>
    <span id="last-modefied">読み込み中...</span>
  </div>

  <div id="playmode">
    <span>プレイモード</span>
    <label>
      <input type="radio" name="playmode" value="SP">SP
    </label>
    <label>
      <input type="radio" name="playmode" value="DP">DP
    </label>
  </div>

  <div id="conditions">
    <details id="selected-versions">
      <summary>
        <span class="summary-label">バージョン</span>
        <span class="summary-values"></span>
      </summary>
      <div class="conditions-inner">
        <button class="selection-all">すべて</button>
        <button class="selection-clear">クリア</button>
        <div class="checkbox-list"></div>
      </div>
    </details>
    
    <details id="selected-difficulties">
      <summary>
        <span class="summary-label">難易度</span>
        <span class="summary-values"></span>
      </summary>
      <div class="conditions-inner">
        <button class="selection-all">すべて</button>
        <button class="selection-clear">クリア</button>
        <div class="checkbox-list"></div>
      </div>
    </details>

    <details id="selected-levels">
      <summary>
        <span class="summary-label">レベル</span>
        <span class="summary-values"></span>
      </summary>
      <div class="conditions-inner">
        <button class="selection-all">すべて</button>
        <button class="selection-clear">クリア</button>
        <div class="checkbox-list"></div>
      </div>
    </details>

    <details id="selected-notesradars">
      <summary>
        <span class="summary-label">ノーツレーダー属性</span>
        <span class="summary-values"></span>
      </summary>
      <div class="conditions-inner">
        <button class="selection-all">すべて</button>
        <button class="selection-clear">クリア</button>
        <div class="checkbox-list"></div>
      </div>
    </details>

    <details id="selected-categories">
      <summary>
        <span class="summary-label">カテゴリ</span>
        <span class="summary-values"></span>
      </summary>
      <div class="conditions-inner">
        <button class="selection-all">すべて</button>
        <button class="selection-clear">クリア</button>
        <div class="checkbox-list"></div>
      </div>
    </details>

    <div id="songname">
      <span>曲名検索</span>
      <input id="keyword_songname" placeholder="部分一致">
    </div>
    
    <button onclick="search()">検索</button>
  </div>

  <div>
    <button onclick="toBottom()">下へ</button>
    <div class="pager"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>
          バージョン
          <div class="sort-buttons">
            <button class="sort-icon" data-col="0" data-order="asc">▲</button>
            <button class="sort-icon" data-col="0" data-order="desc">▼</button>
          </div>
        </th>
        <th>
          曲名
          <div class="sort-buttons">
            <button class="sort-icon" data-col="1" data-order="asc">▲</button>
            <button class="sort-icon" data-col="1" data-order="desc">▼</button>
          </div>
        </th>
        <th>
          アーティスト
        </th>
        <th>
          難易度
          <div class="sort-buttons">
            <button class="sort-icon" data-col="3" data-order="asc">▲</button>
            <button class="sort-icon" data-col="3" data-order="desc">▼</button>
          </div>
        </th>
        <th>
          レベル
          <div class="sort-buttons">
            <button class="sort-icon" data-col="4" data-order="asc">▲</button>
            <button class="sort-icon" data-col="4" data-order="desc">▼</button>
          </div>
        </th>
        <th>
          ノーツ数
          <div class="sort-buttons">
            <button class="sort-icon" data-col="5" data-order="asc">▲</button>
            <button class="sort-icon" data-col="5" data-order="desc">▼</button>
          </div>
        </th>
        <th>
          レーダー
          <div class="sort-buttons">
            <button class="sort-icon" data-col="6" data-order="asc">▲</button>
            <button class="sort-icon" data-col="6" data-order="desc">▼</button>
          </div>
        </th>
        <th>
          カテゴリ
          <div class="sort-buttons">
            <button class="sort-icon" data-col="7" data-order="asc">▲</button>
            <button class="sort-icon" data-col="7" data-order="desc">▼</button>
          </div>
        </th>
      </tr>
    </thead>
    <tbody id="result"></tbody>
  </table>

  <div>
    <button onclick="toTop()">上へ</button>
    <div class="pager"></div>
  </div>
</body>
</html>
